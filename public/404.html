<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Chat Copilot</title>
  <script>
    // GitHub Pages SPA redirect: store the path and redirect to index.html at root
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host +
      '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search + l.hash)
    );
  </script>
</head>
<body></body>
</html>
