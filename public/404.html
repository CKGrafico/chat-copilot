<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Chat Copilot</title>
  <script>
    // GitHub Pages SPA redirect: store the path and redirect to index.html
    // index.html will read it and restore the route via history.replaceState
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') +
      '/?p=' + encodeURIComponent(l.pathname.slice(1) + (l.search ? '&' + l.search.slice(1) : '') + l.hash)
    );
  </script>
</head>
<body></body>
</html>
